name: Build iOS IPA (Unsigned)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-26  # Runner with Xcode 26.4.1 [citation:1][citation:4]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24' # Capacitor 8 requires Node 22+
      
      - name: Install dependencies
        run: npm install
      
      - name: Build web assets
        run: npm run build
      
      - name: Add iOS platform
        run: npx cap add ios
      
      - name: Copy Firebase config and entitlements
        run: |
          mkdir -p ios/App/App
          cp GoogleService-Info.plist ios/App/App/GoogleService-Info.plist
          cp App.entitlements ios/App/App/App.entitlements
      
      - name: Sync Capacitor
        run: npx cap sync ios
      
      - name: Build unsigned IPA
        run: |
          cd ios/App
          xcodebuild clean build \
            -project App.xcodeproj \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath ./build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
      
      - name: Create IPA
        run: |
          mkdir -p Payload
          cp -r ios/App/build/Build/Products/Release-iphoneos/App.app Payload/
          zip -r GigsCourt-iOS-Unsigned.ipa Payload/
          mkdir -p output
          mv GigsCourt-iOS-Unsigned.ipa output/
      
      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: GigsCourt-iOS-Unsigned
          path: output/GigsCourt-iOS-Unsigned.ipa
          retention-days: 30
