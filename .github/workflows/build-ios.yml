name: Build iOS IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: npm install
      
      - name: Build web assets
        run: npm run build
      
      - name: Add iOS Platform
        # This creates the standard Capacitor iOS structure correctly
        run: npx cap add ios
      
      - name: Force iOS 15.0 Target
        run: |
          # 1. Update the platform line in the Podfile
          sed -i '' "s/platform :ios, '11.0'/platform :ios, '15.0'/" ios/App/Podfile
          
          # 2. Add a post_install hook to the Podfile to force ALL pods to iOS 15.0
          # This is the most reliable way to fix the Authgear version error
          cat >> ios/App/Podfile << 'EOF'

          post_install do |installer|
            installer.pods_project.targets.each do |target|
              target.build_configurations.each do |config|
                config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '15.0'
              end
            end
          end
          EOF
          
      - name: Sync and Update Pods
        run: |
          npx cap sync ios
          cd ios/App
          pod install --repo-update
      
      - name: Configure Info.plist for Authgear
        run: |
          PLIST="ios/App/App/Info.plist"
          /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes array" $PLIST || true
          /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes:0 dict" $PLIST || true
          /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes:0:CFBundleURLName string com.gigscourt.app" $PLIST || true
          /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes:0:CFBundleURLSchemes array" $PLIST || true
          /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes:0:CFBundleURLSchemes:0 string com.gigscourt.app" $PLIST || true

      - name: Build App Execution
        run: |
          xcodebuild build \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath ./build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -r ./build/Build/Products/Release-iphoneos/App.app Payload/
          zip -r GigsCourt-iOS.ipa Payload/
      
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: GigsCourt-iOS
          path: GigsCourt-iOS.ipa
