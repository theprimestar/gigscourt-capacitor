name: Build iOS IPA (Unsigned)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: npm install
      
      - name: Build web assets
        run: npm run build
      
      - name: Add iOS platform
        run: npx cap add ios
      
      - name: Copy Firebase config and entitlements
        run: |
          mkdir -p ios/App/App
          cp GoogleService-Info.plist ios/App/App/GoogleService-Info.plist
          cp App.entitlements ios/App/App/App.entitlements

      - name: Create Podfile with required post_install hook
        run: |
          cd ios/App
          cat > Podfile << 'EOF'
          platform :ios, '15.0'
          use_frameworks!

          target 'App' do
            pod 'Capacitor', :path => '../../node_modules/@capacitor/ios'
            pod 'CapacitorCordova', :path => '../../node_modules/@capacitor/ios'
            pod 'CapacitorFirebaseAuthentication', :path => '../../node_modules/@capacitor-firebase/authentication'
          end

          post_install do |installer|
            installer.pods_project.targets.each do |target|
              target.build_configurations.each do |config|
                config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '15.0'
                if target.respond_to?(:product_type) and target.product_type == "com.apple.product-type.bundle"
                  config.build_settings['CODE_SIGNING_ALLOWED'] = 'NO'
                end
              end
            end
          end
          EOF

      - name: Nuclear Clean and Pod Install
        run: |
          cd ios/App
          rm -rf Pods Podfile.lock
          pod cache clean --all
          pod install --repo-update

      - name: Sync Capacitor
        run: npx cap sync ios
      
      - name: Build unsigned IPA
        run: |
          cd ios/App
          xcodebuild clean build \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath ./build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
      
      - name: Create IPA
        run: |
          mkdir -p Payload
          cp -r ios/App/build/Build/Products/Release-iphoneos/App.app Payload/
          zip -r GigsCourt-iOS-Unsigned.ipa Payload/
          mkdir -p output
          mv GigsCourt-iOS-Unsigned.ipa output/
      
      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: GigsCourt-iOS-Unsigned
          path: output/GigsCourt-iOS-Unsigned.ipa
          retention-days: 30
