name: Build iOS IPA (Unsigned)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: npm install
      
      - name: Build web assets
        run: npm run build
      
      - name: Create iOS project structure manually
        run: |
          mkdir -p ios/App/App
          mkdir -p ios/App/App.xcodeproj
          mkdir -p ios/App/Pods
          
          # Create minimal Podfile with iOS 15.0 requirement
          cd ios/App
          cat > Podfile << 'EOF'
          platform :ios, '15.0'
          use_frameworks!

          target 'App' do
            pod 'Capacitor', :path => '../../node_modules/@capacitor/ios'
            pod 'CapacitorCordova', :path => '../../node_modules/@capacitor/ios'
            pod 'AuthgearCapacitor', :path => '../../node_modules/@authgear/capacitor'
          end

          post_install do |installer|
            installer.pods_project.targets.each do |target|
              target.build_configurations.each do |config|
                config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '15.0'
              end
            end
          end
          EOF
          echo "✅ iOS project structure created with deployment target 15.0"
      
      - name: Copy web assets and sync plugins
        run: |
          npx cap copy ios
          npx cap update ios
      
      - name: Generate Xcode project
        run: |
          cd ios/App
          xcodegen generate --spec ../../node_modules/@capacitor/ios/project.yml || true
          
          # If xcodegen fails, create a minimal project.pbxproj
          if [ ! -f "App.xcodeproj/project.pbxproj" ]; then
            cat > App.xcodeproj/project.pbxproj << 'PBXEOF'
            // !$*UTF8*$!
            {
              archiveVersion = 1;
              classes = {
              };
              objectVersion = 56;
              objects = {
              };
              rootObject = "";
            }
            PBXEOF
          fi
          
          # Force IPHONEOS_DEPLOYMENT_TARGET in Xcode project
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = [0-9.]*/IPHONEOS_DEPLOYMENT_TARGET = 15.0/g' App.xcodeproj/project.pbxproj
          echo "✅ Xcode project generated and deployment target forced to 15.0"
      
      - name: Install CocoaPods dependencies
        run: |
          cd ios/App
          pod install --repo-update
      
      - name: Configure iOS URL Scheme for Authgear
        run: |
          # Create Info.plist if it doesn't exist
          mkdir -p ios/App/App
          if [ ! -f "ios/App/App/Info.plist" ]; then
            cat > ios/App/App/Info.plist << 'PLISTEOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict/>
          </plist>
          PLISTEOF
          fi
          
          /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes array" ios/App/App/Info.plist || true
          /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes:0 dict" ios/App/App/Info.plist || true
          /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes:0:CFBundleURLName string com.gigscourt.app" ios/App/App/Info.plist || true
          /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes:0:CFBundleURLSchemes array" ios/App/App/Info.plist || true
          /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes:0:CFBundleURLSchemes:0 string com.gigscourt.app" ios/App/App/Info.plist || true
          echo "✅ Custom URL scheme configured for Authgear"
      
      - name: Build unsigned IPA
        run: |
          cd ios/App
          xcodebuild clean build \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath ./build \
            IPHONEOS_DEPLOYMENT_TARGET=15.0 \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
      
      - name: Create IPA
        run: |
          mkdir -p Payload
          cp -r ios/App/build/Build/Products/Release-iphoneos/App.app Payload/
          zip -r GigsCourt-iOS-Unsigned.ipa Payload/
          mkdir -p output
          mv GigsCourt-iOS-Unsigned.ipa output/
      
      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: GigsCourt-iOS-Unsigned
          path: output/GigsCourt-iOS-Unsigned.ipa
          retention-days: 30
