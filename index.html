<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>GigsCourt</title>
    
    <!-- Styles -->
    <link rel="stylesheet" href="styles.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#C0392B">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body>
    <div id="app">
        <!-- Welcome Screen -->
        <div id="welcomeScreen" class="screen active">
            <div class="logo-container">
                <h1 class="app-title">GigsCourt</h1>
                <p class="app-tagline">Find local gig workers near you</p>
            </div>
            <div class="auth-buttons">
                <button class="primary-btn" onclick="document.getElementById('welcomeScreen').classList.remove('active'); document.getElementById('loginScreen').classList.add('active');">Login</button>
                <button class="secondary-btn" onclick="document.getElementById('welcomeScreen').classList.remove('active'); document.getElementById('signupScreen').classList.add('active');">Sign Up</button>
            </div>
        </div>

        <!-- Login Screen -->
        <div id="loginScreen" class="screen">
            <div class="screen-header">
                <button class="back-btn" onclick="document.getElementById('loginScreen').classList.remove('active'); document.getElementById('welcomeScreen').classList.add('active');">←</button>
                <h2>Login</h2>
                <div></div>
            </div>
            <form id="loginForm" class="auth-form" onsubmit="return false;">
                <div class="form-group">
                    <label for="loginEmail">Email</label>
                    <input type="email" id="loginEmail" placeholder="your@email.com" required>
                </div>
                <div class="form-group">
                    <label for="loginPassword">Password</label>
                    <input type="password" id="loginPassword" placeholder="••••••••" required>
                </div>
                <button type="submit" class="primary-btn full-width" onclick="window.startAuthgearLogin();">Login</button>
                <p class="form-footer">
                    Don't have an account? 
                    <button type="button" class="text-link" onclick="document.getElementById('loginScreen').classList.remove('active'); document.getElementById('signupScreen').classList.add('active');">Sign Up</button>
                </p>
            </form>
            <div id="loginError" class="error-message"></div>
        </div>

        <!-- Signup Screen -->
        <div id="signupScreen" class="screen">
            <div class="screen-header">
                <button class="back-btn" onclick="document.getElementById('signupScreen').classList.remove('active'); document.getElementById('welcomeScreen').classList.add('active');">←</button>
                <h2>Sign Up</h2>
                <div></div>
            </div>
            <form id="signupForm" class="auth-form" onsubmit="return false;">
                <div class="form-group">
                    <label for="signupEmail">Email</label>
                    <input type="email" id="signupEmail" placeholder="your@email.com" required>
                </div>
                <div class="form-group">
                    <label for="signupPassword">Password</label>
                    <input type="password" id="signupPassword" placeholder="••••••••" required>
                    <small class="helper-text">At least 6 characters</small>
                </div>
                <div class="form-group">
                    <label for="signupConfirmPassword">Confirm Password</label>
                    <input type="password" id="signupConfirmPassword" placeholder="••••••••" required>
                </div>
                <button type="submit" class="primary-btn full-width" onclick="window.startAuthgearLogin();">Create Account</button>
                <p class="form-footer">
                    Already have an account? 
                    <button type="button" class="text-link" onclick="document.getElementById('signupScreen').classList.remove('active'); document.getElementById('loginScreen').classList.add('active');">Login</button>
                </p>
            </form>
            <div id="signupError" class="error-message"></div>
        </div>

        <!-- Loading Overlay -->
        <div id="loadingOverlay" class="overlay">
            <div class="spinner"></div>
            <p>Please wait...</p>
        </div>
    </div>

    <!-- Authgear Web SDK (Global) -->
    <script src="https://cdn.authgear.com/authgear-web-sdk/3.0.0/authgear-web.js"></script>
    
    <!-- App Configuration -->
    <script src="app-config.js"></script>
    
    <!-- App Scripts -->
    <script src="app.js"></script>
</body>
</html>
